name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOWORK: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        # Do NOT initialize submodules

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task deps

      - name: Run tests
        run: task test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GOWORK: "off"
      GOGC: "50"
      GOMEMLIMIT: 4GiB
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        # Do NOT initialize submodules

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check module graph is tidy
        run: task tidy-lint

      - name: Read golangci-lint version
        id: golangci
        run: echo "version=v$(cat .golangci.version)" >> "$GITHUB_OUTPUT"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.golangci.outputs.version }}
          args: --timeout=30m --concurrency=1 --path-prefix=.

  workspace:
    name: Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GOGC: "50"
      GOMEMLIMIT: 4GiB
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        # Do NOT initialize submodules

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            browser/go.sum
            fingerprint/go.sum
            http3/go.sum

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create local workspace
        run: go work init . ./browser ./fingerprint ./http3

      - name: Run workspace tests
        run: task test:all

      - name: Run workspace linters
        run: task lint:all

      - name: Run workspace vulnerability checks
        run: task vuln:all

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOWORK: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run govulncheck
        run: task vuln
